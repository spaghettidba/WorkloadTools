name: WorkloadTools Build & MSI

on:
  push:
    paths:
      - 'SharedAssemblyInfo.cs'

jobs:
  build-msi:
    runs-on: self-hosted
    
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Extract Version
        id: extract_version
        shell: pwsh
        run: |
          $assemblyInfoPath = "${{ github.workspace }}\SharedAssemblyInfo.cs"
          $assemblyVersion = Get-Content $assemblyInfoPath |
            Select-String -Pattern 'AssemblyFileVersion\("([0-9.]+)"\)' |
            ForEach-Object { $_.Matches.Groups[1].Value }
          
          Write-Host "Version: $assemblyVersion"
          echo "version=$assemblyVersion" | Out-File -FilePath $env:GITHUB_ENV -Append
          echo "::set-output name=version::$assemblyVersion"

      - name: Build Solution
        run: dotnet build WorkloadTools.sln --configuration Release

      - name: Generate MSI
        shell: pwsh
        run: |
          powershell Setup\buildmsi_giuthubaction.ps1 `
            -BuildVersion "${{ steps.extract_version.outputs.version }}" `
            -WixBinPath "C:\wix"

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.extract_version.outputs.version }}
          release_name: "Release ${{ steps.extract_version.outputs.version }}"
          draft: false
          prerelease: false

      - name: Upload MSI to GitHub Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: "C:/temp/WorkloadTools-${{ steps.extract_version.outputs.version }}.msi"
          asset_name: "WorkloadTools-${{ steps.extract_version.outputs.version }}.msi"
          asset_content_type: application/octet-stream
